ShortDescription: Local-first, offline AI photo organizer for Windows.
Description: |
  Photo by Face Organizer sorts your photo and video library by date,
  location, and faces — entirely on your own computer. No cloud
  uploads, no telemetry, no account required.

  Features:
   - Date/location/face folder organization
   - InsightFace + DBSCAN clustering, fully local
   - Exact and near-duplicate detection
   - Per-person albums + timelines
   - Co-occurrence relationships
   - Burst detection with recommended keepers
   - HTML report dashboard
   - Verified copies, full rollback

